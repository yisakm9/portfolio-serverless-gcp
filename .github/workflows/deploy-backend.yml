name: Deploy Backend (Cloud Functions)

on:
  # Manual trigger only — the Production Pipeline handles push-triggered deploys
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  TF_VERSION: 1.13.1
  WORKING_DIR: ./terraform/environments/dev
  PROJECT_ID: project-6cdce5b2-1881-424f-a94

permissions:
  id-token: write
  contents: read

jobs:
  update-functions:
    name: Update Cloud Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # GCP Authentication via Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Terraform Init
        run: terraform init

      # Terraform will detect that main.py has changed, re-zip it,
      # and update only the Cloud Function resource.
      - name: Deploy Backend Changes
        run: terraform apply -auto-approve