name: Production Deployment Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  TF_VERSION: 1.5.7
  WORKING_DIR: ./terraform/environments/dev
  PROJECT_ID: project-6cdce5b2-1881-424f-a94

permissions:
  id-token: write
  contents: read

jobs:
  # ------------------------------------------------------------------
  # JOB 1: CHANGE DETECTION
  # ------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'terraform/**'
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ------------------------------------------------------------------
  # JOB 2: INFRASTRUCTURE & BACKEND (Terraform)
  # GCP equivalent of: AWS IAM OIDC → Terraform Apply
  # ------------------------------------------------------------------
  deploy-infra:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' }}
    name: Deploy Infra & Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # GCP Authentication via Workload Identity Federation
      # Replaces: aws-actions/configure-aws-credentials
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

  # ------------------------------------------------------------------
  # JOB 3: FRONTEND (React)
  # GCP equivalent of: Build → gsutil sync → CDN invalidation
  # ------------------------------------------------------------------
  deploy-frontend:
    needs: [detect-changes, deploy-infra]
    if: ${{ always() && needs.detect-changes.outputs.frontend == 'true' && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') }}
    name: Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      # GCP Authentication
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Fetch dynamic config from Terraform outputs (replaces SSM Parameter Store)
      - name: Fetch Dynamic Config from Terraform
        id: fetch-config
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Setup Terraform to read outputs
          terraform init -backend=true
          
          # Fetch Cloud Function URLs
          CONTACT_URL=$(terraform output -raw contact_function_url)
          echo "CONTACT_URL=$CONTACT_URL" >> $GITHUB_ENV
          
          PROJECTS_URL=$(terraform output -raw projects_function_url)
          echo "PROJECTS_URL=$PROJECTS_URL" >> $GITHUB_ENV
          
          # Fetch bucket name and URL map
          BUCKET=$(terraform output -raw frontend_bucket_name)
          echo "GCS_BUCKET=$BUCKET" >> $GITHUB_ENV
          
          URL_MAP=$(terraform output -raw url_map_name)
          echo "URL_MAP_NAME=$URL_MAP" >> $GITHUB_ENV
        env:
          WORKING_DIR: ${{ env.WORKING_DIR }}

      - name: Debug Variables
        run: |
          echo "Contact URL: ${{ env.CONTACT_URL }}"
          echo "Projects URL: ${{ env.PROJECTS_URL }}"
          echo "Bucket: ${{ env.GCS_BUCKET }}"

      # Build with Cloud Function URLs injected
      - name: Build Production Bundle
        run: npm run build
        env:
          VITE_API_CONTACT_URL: ${{ env.CONTACT_URL }}
          VITE_API_PROJECTS_URL: ${{ env.PROJECTS_URL }}

      # Upload to GCS (replaces aws s3 sync)
      - name: Sync to GCS
        run: |
          gsutil -m rsync -r -d ./dist gs://${{ env.GCS_BUCKET }}

      # Invalidate CDN cache (replaces CloudFront invalidation)
      - name: Invalidate Cloud CDN Cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ env.URL_MAP_NAME }} \
            --path="/*" \
            --project=${{ env.PROJECT_ID }} \
            --async